services:
  postgres:
    image: postgres:17-alpine
    container_name: fluento-postgres
    environment:
      POSTGRES_DB: fluento
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/migration/V1__Initial_schema.sql:/docker-entrypoint-initdb.d/V1__Initial_schema.sql
      - ./src/main/resources/db/migration/V2__Add_password_to_users.sql:/docker-entrypoint-initdb.d/V2__Add_password_to_users.sql
      - ./src/main/resources/db/migration/V3__Add_characters_table.sql:/docker-entrypoint-initdb.d/V3__Add_characters_table.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d fluento"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fluento-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrate:
    image: postgres:17-alpine
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: fluento
    volumes:
      - ./scripts/run_migrations.sh:/run_migrations.sh
    command: sh /run_migrations.sh
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    container_name: fluento-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fluento
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_COGNITO_USER_POOL_ID: ${AWS_COGNITO_USER_POOL_ID}
      AWS_COGNITO_CLIENT_ID: ${AWS_COGNITO_CLIENT_ID}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-default}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
