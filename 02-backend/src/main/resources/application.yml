spring:
  application:
    name: fluento-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fluento}
    username: ${DB_USER:jeongsua}
    password: ${DB_PASSWORD:1234}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: FluentoHikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000       # 10분: 유휴 커넥션 반환 대기
      max-lifetime: 1800000      # 30분: 커넥션 최대 수명
      connection-timeout: 30000  # 30초: 커넥션 획득 대기
      keepalive-time: 60000      # 1분: DB 방화벽 타임아웃 방지
      connection-test-query: SELECT 1

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # password: ${REDIS_PASSWORD:}
      timeout: 2000ms             # 커넥션/읽기 타임아웃
      connect-timeout: 1000ms     # 초기 연결 타임아웃
      lettuce:
        pool:
          max-active: 8           # 최대 활성 커넥션
          max-idle: 8             # 최대 유휴 커넥션
          min-idle: 2             # 최소 유휴 커넥션 (항상 유지)
          max-wait: 1000ms        # 커넥션 풀 대기 최대 시간


server:
  port: 8080
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Sentry - Spring Boot 4.x 호환 버전 출시 후 Phase 6에서 추가 예정
# sentry:
#   dsn: ${SENTRY_DSN:}
#   traces-sample-rate: 1.0
#   environment: ${SPRING_PROFILES_ACTIVE:local}

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: 86400000

google:
  client-id: ${GOOGLE_CLIENT_ID:1095741245664-5gmaspknmej4m45u9mildeqf9behpmhs.apps.googleusercontent.com}

aws:
  region: ${AWS_REGION:ap-northeast-2}
  cognito:
    user-pool-id: ${AWS_COGNITO_USER_POOL_ID:}
    client-id: ${AWS_COGNITO_CLIENT_ID:}

openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  stream:
    max-tokens: ${OPENAI_STREAM_MAX_TOKENS:500}
    temperature: ${OPENAI_STREAM_TEMPERATURE:0.8}
  sync:
    max-tokens: ${OPENAI_SYNC_MAX_TOKENS:800}
    temperature: ${OPENAI_SYNC_TEMPERATURE:0.3}

logging:
  level:
    com.fluento: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
