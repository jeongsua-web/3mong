spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost/dev
          jwk-set-uri: http://localhost/dev/.well-known/jwks.json

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

fluento:
  dev-mode: true

logging:
  level:
    com.fluento: DEBUG
    org.springframework.security: DEBUG
