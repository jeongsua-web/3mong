spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

app:
  jwt:
    secret: dev-only-secret-key-do-not-use-in-production-min32chars
    expiration-ms: 86400000

fluento:
  dev-mode: true

logging:
  level:
    com.fluento: DEBUG
    org.springframework.security: DEBUG
