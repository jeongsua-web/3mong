name: Deploy Backend to EC2

on:
  push:
    branches: [ main ]
    paths:
      - '02-backend/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/fluento
            git pull origin main
            cd 02-backend
            docker compose down
            docker compose up -d --build
